name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # 允许在 GitHub 网页上手动点击按钮触发构建

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: ⚙️ 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 安装 Capacitor 依赖
        run: npm install

      - name: ☕ 设置 Java 17 (Android编译必需)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📁 准备 Web 静态文件 (移动到 www 目录)
        run: |
          mkdir -p www
          cp index.html style.css app.js www/
          
      - name: 🤖 生成 Android 工程并同步代码
        run: |
          if [ ! -d "android" ]; then npx cap add android; fi
          npx cap sync android

      - name: 🎨 生成 App 图标与启动页 (必须在生成 Android 工程之后)
        run: npx @capacitor/assets generate --android

      - name: 🔨 编译构建 Android Debug APK
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 🚀 上传 APK 制品供下载
        uses: actions/upload-artifact@v4
        with:
          name: 快捷日报-v1.0.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
