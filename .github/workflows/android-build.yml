name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: ⚙️ 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 安装 Capacitor 依赖
        run: npm install

      - name: ☕ 设置 Java 17 (Android编译必需)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📁 准备 Web 静态文件 (移动到 www 目录)
        run: |
          mkdir -p www
          cp index.html style.css app.js www/
          
      - name: 🤖 生成 Android 工程并同步代码
        run: |
          npx cap add android
          npx cap sync android

      - name: 🎨 配置状态栏颜色（支持深色模式）
        run: |
          VALUES_DIR="android/app/src/main/res/values"
          VALUES_NIGHT_DIR="android/app/src/main/res/values-night"
          
          mkdir -p "$VALUES_NIGHT_DIR"
          
          cat > "$VALUES_DIR/colors.xml" << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="status_bar_color">#f2f2f7</color>
          </resources>
          EOF
          
          cat > "$VALUES_NIGHT_DIR/colors.xml" << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="status_bar_color">#000000</color>
          </resources>
          EOF
          
          sed -i 's/<style name="AppTheme" parent="Theme.AppCompat.DayNight.DarkActionBar">/<style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">/g' "$VALUES_DIR/styles.xml"
          
          sed -i '/<style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">/,/<\/style>/{
            s/<\/style>/        <item name="android:statusBarColor">@color\/status_bar_color<\/item>\n        <item name="android:windowLightStatusBar">true<\/item>\n    <\/style>/
          }' "$VALUES_DIR/styles.xml"
          
          cat > "$VALUES_NIGHT_DIR/styles.xml" << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="android:statusBarColor">@color/status_bar_color</item>
                  <item name="android:windowLightStatusBar">false</item>
              </style>
          </resources>
          EOF

      - name: 🎨 生成 App 图标与启动页 (必须在生成 Android 工程之后)
        run: npx @capacitor/assets generate --android

      - name: 🔨 编译构建 Android Debug APK
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 🚀 上传 APK 制品供下载
        uses: actions/upload-artifact@v4
        with:
          name: 快捷日报-v1.0.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
